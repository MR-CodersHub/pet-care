<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Pawesome</title>
    <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
    <link rel="stylesheet" href="../dist/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-accent-cream text-dark antialiased min-h-screen flex items-center justify-center">
    <main class="container mx-auto px-6 py-24 text-center">
        <div class="max-w-2xl mx-auto space-y-12">
            <!-- Icon -->
            <div class="relative w-32 h-32 mx-auto">
                <div class="absolute inset-0 bg-primary/20 rounded-full animate-ping"></div>
                <div class="relative w-full h-full bg-primary rounded-full flex items-center justify-center text-white shadow-2xl">
                    <i data-lucide="hammer" class="w-16 h-16"></i>
                </div>
            </div>

            <!-- Content -->
            <div class="space-y-6">
                <h1 class="text-5xl md:text-6xl font-heading font-bold">We're <span class="text-primary italic">Updating</span> Things!</h1>
                <p class="text-xl text-dark/60 leading-relaxed">
                    Our team is currently performing scheduled maintenance to bring you a better pet care experience. We'll be back online shortly!
                </p>
            </div>

            <!-- Progress Bar Mockup -->
            <div class="w-full bg-dark/5 h-3 rounded-full overflow-hidden">
                <div class="bg-primary h-full w-3/4 rounded-full animate-pulse"></div>
            </div>

            <!-- Contact Info -->
            <div class="pt-8 border-t border-dark/5 space-y-4">
                <p class="text-sm font-bold uppercase tracking-widest text-dark/40">Need urgent assistance?</p>
                <div class="flex flex-wrap justify-center gap-6">
                    <a href="mailto:support@pawesome.com" class="flex items-center gap-2 text-primary font-bold hover:underline">
                        <i data-lucide="mail" class="w-5 h-5"></i> support@pawesome.com
                    </a>
                    <a href="tel:+15551234567" class="flex items-center gap-2 text-primary font-bold hover:underline">
                        <i data-lucide="phone" class="w-5 h-5"></i> (555) 123-4567
                    </a>
                </div>
            </div>

            <!-- Back to Home -->
            <div class="pt-10">
                <a href="../index.html" class="inline-flex items-center gap-2 text-dark/40 font-medium hover:text-primary transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Homepage
                </a>
            </div>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>

</html>
