<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Pawesome</title>
    <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
    <link rel="stylesheet" href="../dist/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-accent-cream text-dark antialiased min-h-screen flex flex-col">
    <!-- Section 1: Minimal Navbar -->
    <header class="p-8">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="paw-print"></i>
                </div>
                <span class="font-heading font-bold text-xl tracking-tight">Pawesome</span>
            </a>
            <a href="/pages/contact.html" class="font-bold text-sm hover:text-primary transition-colors">Need help?</a>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-12">
        <!-- Section 2: Error Hero -->
        <div class="relative">
            <h1 class="text-[12rem] md:text-[18rem] font-heading font-black text-primary/5 leading-none select-none">404</h1>
            <div class="absolute inset-0 flex flex-col items-center justify-center space-y-4">
                <div class="w-32 h-32 bg-card rounded-full shadow-2xl flex items-center justify-center text-primary relative">
                    <i data-lucide="search" class="w-12 h-12"></i>
                    <div class="absolute -right-2 -top-2 bg-accent-teal w-8 h-8 rounded-full flex items-center justify-center text-white shadow-lg">
                        <i data-lucide="help-circle" class="w-4 h-4"></i>
                    </div>
                </div>
                <h2 class="text-3xl md:text-5xl font-heading font-bold">Lost your way?</h2>
                <p class="text-dark/40 font-medium max-w-md">It seems the page you are looking for has wandered off like a curious puppy.</p>
            </div>
        </div>

        <!-- Section 3: Recovery Search -->
        <div class="w-full max-w-xl relative">
            <input type="text" placeholder="Search for something else..." class="w-full bg-card border border-dark/5 rounded-3xl px-8 py-5 outline-none shadow-sm focus:shadow-xl transition-all">
            <button class="absolute right-3 top-3 bg-primary text-white p-3 rounded-2xl hover:bg-primary-dark transition-all">
                <i data-lucide="search"></i>
            </button>
        </div>

        <!-- Section 4: Helpful Links Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
            <a href="/" class="bg-card p-6 rounded-3xl border border-dark/5 hover:border-primary transition-all group">
                <i data-lucide="home" class="mx-auto mb-4 text-dark/20 group-hover:text-primary transition-colors"></i>
                <span class="font-bold text-sm">Homepage</span>
            </a>
            <a href="/pages/service.html" class="bg-card p-6 rounded-3xl border border-dark/5 hover:border-primary transition-all group">
                <i data-lucide="scissors" class="mx-auto mb-4 text-dark/20 group-hover:text-primary transition-colors"></i>
                <span class="font-bold text-sm">Services</span>
            </a>
            <a href="/pages/about.html" class="bg-card p-6 rounded-3xl border border-dark/5 hover:border-primary transition-all group">
                <i data-lucide="users" class="mx-auto mb-4 text-dark/20 group-hover:text-primary transition-colors"></i>
                <span class="font-bold text-sm">Our Team</span>
            </a>
            <a href="/pages/blog.html" class="bg-card p-6 rounded-3xl border border-dark/5 hover:border-primary transition-all group">
                <i data-lucide="book-open" class="mx-auto mb-4 text-dark/20 group-hover:text-primary transition-colors"></i>
                <span class="font-bold text-sm">Read Blog</span>
            </a>
        </div>
    </main>

    <!-- Section 5: Minimal Footer -->
    <footer class="p-8 text-center text-sm font-bold text-dark/20 uppercase tracking-widest">
        © 2024 Pawesome Pet Care. Every dog has its day.
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
